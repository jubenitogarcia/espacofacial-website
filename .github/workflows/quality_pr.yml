name: Quality PR Audit

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality-pr:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run quality suite (PR profile)
        id: quality
        continue-on-error: true
        env:
          QUALITY_BASE_URL_OVERRIDE: ${{ vars.QUALITY_BASE_URL_PREVIEW }}
        run: node scripts/run_quality_suite.mjs --mode=pr --serve-local=true

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: quality/reports
          if-no-files-found: warn
          retention-days: 14

      - name: Upsert PR quality comment
        if: always()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- quality-automation-report -->';
            const reportPath = 'quality/reports/pr_comment.md';
            let body = `${marker}\nFalha ao gerar sumário de qualidade. Verifique os artifacts.`;

            if (fs.existsSync(reportPath)) {
              body = fs.readFileSync(reportPath, 'utf8');
            }

            body += `\n\n[Artifacts e logs da execução](${process.env.RUN_URL})`;

            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const previous = comments.find((c) => c.body && c.body.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce PR quality gate (light)
        if: always()
        run: node scripts/quality_gate.mjs --mode=pr --enforce=true
